<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dla Ciebie</title>

<style>
body{
    margin:0;
    font-family: system-ui;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
    overflow:hidden;
}

.card{
    max-width:420px;
    padding:30px;
    z-index:2;
}

button{
    margin:8px 0;
    padding:12px 20px;
    border:none;
    border-radius:14px;
    background:#f472b6;
    color:white;
    font-size:15px;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

input{
    padding:10px;
    border-radius:10px;
    border:none;
    margin-top:10px;
    outline:none;
}

.letters{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin-top:20px;
}

.letter{
    width:50px;
    height:50px;
    background:#1e293b;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:10px;
    font-size:20px;
    cursor:pointer;
    user-select:none;
}

.slot-container{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:20px;
}

.slot{
    width:50px;
    height:50px;
    border:2px dashed #f472b6;
    border-radius:10px;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:20px;
}

.success{
    color:#4ade80;
    margin-top:15px;
    font-weight:bold;
}

.gallery{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:20px;
    max-height:60vh;
    overflow-y:auto;
}

.gallery img{
    width:100%;
    border-radius:12px;
    cursor:pointer;
}

.lightbox{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:999;
}

.lightbox img{
    max-width:90%;
    max-height:80%;
}

.rose {
  position: fixed;
  top: -50px;
  pointer-events:none;
  animation: fall linear forwards;
}

@keyframes fall {
  to {
    transform: translateY(110vh) rotate(360deg);
  }
}
</style>
</head>

<body>

<div class="card" id="box">
    <h2>No dobra...</h2>
    <p>wiem, wiem 😌 8 marca.</p>
    <button onclick="next1()">dalej</button>
</div>

<div class="lightbox" id="lightbox">
    <img id="lightbox-img">
    <button onclick="closeLightbox()">zamknij</button>
</div>

<script>

/* TEKST */

function next1(){
document.getElementById("box").innerHTML = `
<h2>Słyszałem</h2>
<p>że nawet zwiędnięty kwiat się liczy 🌹</p>
<button onclick="next2()">dalej</button>
`;
}

function next2(){
document.getElementById("box").innerHTML = `
<h2>Więc proszę</h2>
<p>Masz tu internetowego kwiatka 🌹</p>
<button onclick="next3()">ale serio...</button>
`;
}

function next3(){
document.getElementById("box").innerHTML = `
<h2>Tak serio</h2>
<button onclick="startGame()">🔒 Rozwiąż, żeby dostać hasło</button>
`;
}

/* MINI GRA */

const correctWord = "KWIECIEŃ";

function startGame(){

let letters = correctWord.split('').sort(() => Math.random() - 0.5);

let slotsHTML = '';
for(let i=0;i<correctWord.length;i++){
    slotsHTML += `<div class="slot" data-index="${i}"></div>`;
}

let lettersHTML = '';
letters.forEach(l=>{
    lettersHTML += `<div class="letter" draggable="true">${l}</div>`;
});

document.getElementById("box").innerHTML = `
<h2>Ułóż poprawne słowo 💭</h2>
<p>To coś, co coś dla nas znaczy...</p>
<div class="slot-container">${slotsHTML}</div>
<div class="letters">${lettersHTML}</div>
<p id="gameMessage"></p>
`;

initDrag();
}

function initDrag(){
const letters = document.querySelectorAll('.letter');
const slots = document.querySelectorAll('.slot');

letters.forEach(letter=>{
    letter.addEventListener('dragstart', e=>{
        e.dataTransfer.setData("text", letter.textContent);
        setTimeout(()=> letter.style.visibility="hidden",0);
    });

    letter.addEventListener('dragend', e=>{
        letter.style.visibility="visible";
    });
});

slots.forEach(slot=>{
    slot.addEventListener('dragover', e=>{
        e.preventDefault();
    });

    slot.addEventListener('drop', e=>{
        e.preventDefault();
        const letter = e.dataTransfer.getData("text");
        slot.textContent = letter;
        checkWord();
    });
});
}

function checkWord(){
let result = "";
document.querySelectorAll('.slot').forEach(slot=>{
    result += slot.textContent;
});

if(result === correctWord){
    document.getElementById("box").innerHTML = `
    <h2>Odblokowane 💖</h2>
    <p>Twoje hasło to:</p>
    <h1>${correctWord.toLowerCase()}</h1>
    <button onclick="showGallery()">Otwórz wspomnienia</button>
    `;
}
}

/* GALERIA */

function showGallery(){
let galleryHTML = '<h2>Nasze momenty 📷</h2><div class="gallery">';
for(let i=1;i<=12;i++){
    galleryHTML += `<img src="zdjecie${i}.png" onclick="openLightbox(${i-1})">`;
}
galleryHTML += '</div>';
document.getElementById("box").innerHTML = galleryHTML;
}

const images = [];
for(let i=1;i<=12;i++){
    images.push(`zdjecie${i}.png`);
}

function openLightbox(index){
document.getElementById("lightbox-img").src = images[index];
document.getElementById("lightbox").style.display="flex";
}

function closeLightbox(){
document.getElementById("lightbox").style.display="none";
}

/* RÓŻE */

function createRose(){
const rose=document.createElement("div");
rose.classList.add("rose");
rose.innerHTML="🌹";
rose.style.left=Math.random()*100+"vw";
rose.style.animationDuration=(4+Math.random()*4)+"s";
rose.style.fontSize=(20+Math.random()*20)+"px";
document.body.appendChild(rose);
setTimeout(()=>rose.remove(),8000);
}
setInterval(createRose,500);

</script>

</body>
</html>
